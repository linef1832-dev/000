        // ปิด Warning ที่ไม่จำเป็นเพื่อให้ Console สะอาด
        const originalWarn = console.warn;
        console.warn = function(...args) {
            try {
                const msg = String(args[0]);
                if (msg.includes('cdn.tailwindcss.com') || msg.includes('Unrecognized feature') || msg.includes('escape its sandboxing')) return;
            } catch (e) {}
            originalWarn.apply(console, args);
        };
    </script>

    <script data-cfasync="false">
        // --- 1. CONFIGURATION (Supabase Credentials) ---
        const CONFIG = {
            SB_URL: 'https://zedbbtjxuidfubpiauyb.supabase.co',
            SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplZGJidGp4dWlkZnVicGlhdXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2MjQ2ODgsImV4cCI6MjA4MzIwMDY4OH0.4orJyfFcOwnZcnHFjLOTLXaqFNeapCVe9yCxj3rLMBM'
        };

        // --- 2. GLOBALS ---
        let appDB; 
        let currentUserData = null;
        let globalSheetsList = [];
        let systemSettingsMap = {};
        const TEAM_LIST_MASTER = ['Jun88','MK8','F168','PG688','JL69','NM9','VV72','TH26'];
        let shiftGroups = { 'กะเช้า': {'ช่วงที่ 1':[],'ช่วงที่ 2':[],'ช่วงที่ 3':[]}, 'กะกลาง': {'ช่วงที่ 1':[],'ช่วงที่ 2':[],'ช่วงที่ 3':[]}, 'กะดึก': {'ช่วงที่ 1':[],'ช่วงที่ 2':[],'ช่วงที่ 3':[]} };

        // --- 3. STARTUP ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Initialize Supabase Client (ใช้ชื่อ appDB เพื่อไม่ให้ซ้อนกับ Library)
                appDB = window.supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
                
                // ดึงข้อมูลรอบเวลาพัก
                const { data: slots } = await appDB.from('time_slots').select('*');
                if(slots) slots.forEach(s => { if(shiftGroups[s.shift_name]) shiftGroups[s.shift_name][s.period_name].push(s.time_str); });

                // ดึงการตั้งค่าระบบ
                const { data: settings } = await appDB.from('settings').select('*');
                if(settings) settings.forEach(s => systemSettingsMap[s.key] = s.value);

                setupPinInputs();
                const sessionUser = sessionStorage.getItem('user_platinum_plus');
                if (sessionUser) loginSuccess(JSON.parse(sessionUser));
                else showLogin();
            } catch (err) { 
                console.error("Initialization Critical Fail:", err); 
                document.getElementById('loading').innerHTML = `<p class='text-red-500 font-bold p-10 bg-white rounded shadow text-center'>เชื่อมต่อล้มเหลว กรุณารีเฟรช</p>`;
            }
        });

        // --- 4. AUTHENTICATION ---
        function showLogin() { document.getElementById('loading').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); }
        async function handleLogin(e) {
            if(e) e.preventDefault();
            const name = document.getElementById('loginName').value.trim();
            const pin = Array.from(document.querySelectorAll('.pin-box')).map(b => b.value).join('');
            if(!name || pin.length !== 6) return;

            Swal.fire({title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            try {
                const { data } = await appDB.from('users').select('*').ilike('username', name);
                if(!data || data.length === 0) return Swal.fire('Error', 'ไม่พบรายชื่อในระบบ', 'error');
                const user = data[0];
                if(user.password && user.password !== pin) return Swal.fire('Error', 'PIN ไม่ถูกต้อง', 'error');
                if(!user.password) await appDB.from('users').update({password: pin}).eq('id', user.id);
                loginSuccess(user);
                Swal.close();
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        }
        window.handleLogin = handleLogin;

        function loginSuccess(user) {
            currentUserData = user;
            sessionStorage.setItem('user_platinum_plus', JSON.stringify(user));
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            // 🛡️ ป้องกัน ErrorTypeError ด้วยการเช็ค uName
            const uNameEl = document.getElementById('uName');
            if (uNameEl) uNameEl.innerText = user.username;
            
            if(['manager', 'admin'].includes(user.role)) {
                document.getElementById('menu_admin')?.classList.remove('hidden');
                document.getElementById('sheetAdminControls')?.classList.remove('hidden');
            }
            initDashboardUI();
        }

        // --- 5. DASHBOARD & DATA FETCHING ---
        function initDashboardUI() {
            const now = new Date(); if(now.getHours() < 8) now.setDate(now.getDate() - 1);
            document.getElementById('wDate').value = now.toISOString().split('T')[0];
            document.getElementById('dailyTeam').innerHTML = TEAM_LIST_MASTER.map(t => `<option value="${t}">${t}</option>`).join('');
            if(currentUserData.team) document.getElementById('dailyTeam').value = currentUserData.team;
            renderShiftButtons(currentUserData.allowed_shift);
            handleDateChange();
        }

        window.handleDateChange = () => { fetchData(); document.getElementById('displayDate').innerText = new Date(document.getElementById('wDate').value).toLocaleDateString('th-TH', {day:'numeric', month:'long', year:'numeric'}); };

        async function fetchData() {
            const dateVal = document.getElementById('wDate').value;
            const { data } = await appDB.from('schedules').select('*').eq('work_date', dateVal);
            if(data) {
                const tBody = document.getElementById('dataTableBody');
                if(!tBody) return;
                tBody.innerHTML = data.sort((a,b)=>a.time_slot.localeCompare(b.time_slot)).map(s => `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition">
                        <td class="px-6 py-4 text-center font-black text-[10px] text-gray-500 uppercase border-r dark:border-slate-700">${getPeriodLabel(s.shift_name, s.time_slot)}</td>
                        <td class="px-6 py-4 font-bold text-slate-800 dark:text-white">${s.staff_name}</td>
                        <td class="px-6 py-4 text-xs font-bold text-indigo-500">${s.team} / ${s.shift_name}</td>
                        <td class="px-6 py-4 font-mono font-black text-blue-600 dark:text-blue-400 text-lg">${s.time_slot}</td>
                        <td class="px-6 py-4 text-center">${(currentUserData.role==='manager'||s.staff_name===currentUserData.username)?`<button onclick="deleteSch(${s.id})" class="text-red-500 material-icons p-2 bg-red-50 dark:bg-red-900/20 rounded-xl transition shadow-sm">delete</button>`:'-'}</td>
                    </tr>`).join('') || '<tr><td colspan="5" class="text-center py-20 text-gray-400 font-bold italic">-- ไม่มีข้อมูล --</td></tr>';
                document.getElementById('quotaDisplay').innerText = `พนักงานจองพักรวม: ${data.length} รายการ`;
            }
        }

        // --- 6. SHEETS & CALCULATOR ---
        async function fetchSheets() {
            const container = document.getElementById('sheetGroupsContainer');
            if(!container) return;
            container.innerHTML = '<div class="col-span-full py-20 text-center animate-pulse text-emerald-400 font-black uppercase">กำลังดึงข้อมูลชีท...</div>';
            const { data } = await appDB.from('external_sheets').select('*').order('group_name');
            if(data) { globalSheetsList = data; renderSheetMenu(); }
        }

        function renderSheetMenu() {
            const container = document.getElementById('sheetGroupsContainer');
            if(!container) return;
            const groups = {}; 
            globalSheetsList.forEach(s => {
                const g = s.group_name || 'ทั่วไป';
                if(!groups[g]) groups[g] = [];
                groups[g].push(s);
            });
            let html = '';
            Object.keys(groups).sort().forEach(g => {
                html += `<div class="animate-fade-in"><h3 class="text-slate-500 font-black text-xs uppercase tracking-widest mb-6 flex items-center gap-3"><span class="w-8 h-px bg-slate-800"></span> ${g}</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">${groups[g].map(s => `
                    <div class="item-card h-40 flex flex-col items-center justify-center text-center group border-2 border-transparent hover:border-emerald-500/50" onclick='openSheet(${JSON.stringify(s)})'>
                        <div class="absolute top-0 left-0 w-full h-1" style="background-color:${s.color || '#10b981'}"></div>
                        <div class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-3 group-hover:bg-indigo-600/30 transition shadow-inner"><span class="material-icons text-3xl text-white opacity-70">table_view</span></div>
                        <span class="font-black text-sm text-white truncate w-full px-3">${s.name}</span>
                    </div>`).join('')}</div></div>`;
            });
            container.innerHTML = html;
            initCalculator();
        }

        window.openSheet = (sheet) => {
            document.getElementById('sheetMenu').classList.add('hidden');
            document.getElementById('sheetViewer').classList.remove('hidden');
            document.getElementById('sheetViewerTitle').innerText = sheet.name;
            document.getElementById('sheetLoading').classList.remove('hidden');
            const frame = document.getElementById('sheetFrame');
            frame.onload = () => document.getElementById('sheetLoading').classList.add('hidden');
            frame.src = sheet.sheet_id.startsWith('http') ? sheet.sheet_id : `https://docs.google.com/spreadsheets/d/${sheet.sheet_id}/edit?rm=minimal`;
        };
        window.closeSheet = () => { document.getElementById('sheetViewer').classList.add('hidden'); document.getElementById('sheetMenu').classList.remove('hidden'); document.getElementById('sheetFrame').src = 'about:blank'; };

        function initCalculator() {
            const sel = document.getElementById('calcTeamSelect');
            if(!sel) return;
            sel.innerHTML = TEAM_LIST_MASTER.map(t => `<option value="${t}">${t}</option>`).join('');
            if(currentUserData.team) sel.value = currentUserData.team;
            loadCalcSettings();
        }

        window.loadCalcSettings = async () => {
            const team = document.getElementById('calcTeamSelect').value;
            document.getElementById('calcDeductAmount').value = systemSettingsMap[`calc_deduct_${team}`] || 0;
            const isAdmin = ['manager','admin'].includes(currentUserData.role);
            document.getElementById('calcDeductAmount').disabled = !isAdmin;
            if(isAdmin) document.getElementById('btnSaveCalc').classList.remove('hidden'); else document.getElementById('btnSaveCalc').classList.add('hidden');
            document.getElementById('calcLockIcon').innerText = isAdmin ? 'lock_open' : 'lock';
            calculateMoney();
        };

        window.calculateMoney = () => {
            const amount = parseFloat(document.getElementById('calcInputAmount').value) || 0;
            const deduct = parseFloat(document.getElementById('calcDeductAmount').value) || 0;
            const res = amount - deduct;
            const display = document.getElementById('calcResultDisplay');
            display.innerText = res.toLocaleString();
            display.className = res < 0 ? "bg-slate-950 text-red-500 text-4xl font-black p-4 rounded-2xl text-right border border-slate-800 shadow-inner mb-4" : "bg-slate-950 text-emerald-400 text-4xl font-black p-4 rounded-2xl text-right border border-slate-800 shadow-inner mb-4";
        };

        window.saveCalcSettings = async () => {
            const team = document.getElementById('calcTeamSelect').value;
            const val = document.getElementById('calcDeductAmount').value;
            await appDB.from('settings').upsert([{ key: `calc_deduct_${team}`, value: val }]);
            systemSettingsMap[`calc_deduct_${team}`] = val;
            Swal.fire({ icon:'success', title:'บันทึกสำเร็จ', toast:true, position:'top-end', showConfirmButton:false, timer:1500 });
        };

        window.copyCalcResult = () => {
            const val = document.getElementById('calcResultDisplay').innerText.replace(/,/g, '');
            const el = document.createElement('textarea'); el.value = val; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            Swal.fire({ icon:'success', title:'ก๊อปปี้สำเร็จ: '+val, toast:true, position:'top-end', showConfirmButton:false, timer:1000 });
        };

        // --- 7. UTILS ---
        function setupPinInputs() {
            const boxes = document.querySelectorAll('.pin-box');
            boxes.forEach((box, i) => {
                box.addEventListener('input', e => { if (e.target.value.length === 1 && i < 5) boxes[i+1].focus(); if (Array.from(boxes).every(b=>b.value)) handleLogin(); });
                box.addEventListener('keydown', e => { if (e.key === 'Backspace' && !e.target.value && i > 0) boxes[i-1].focus(); });
            });
        }
        function getPeriodLabel(shift, time) { if(!shiftGroups[shift]) return '-'; for(let p in shiftGroups[shift]) { if(shiftGroups[shift][p].includes(time)) return p.replace('ช่วงที่ ', 'P'); } return '-'; }
        function renderShiftButtons(allowed) {
            const container = document.getElementById('shiftContainer');
            const shifts = [{v:'กะเช้า', l:'☀️ เช้า'}, {v:'กะกลาง', l:'🌤️ กลาง'}, {v:'กะดึก', l:'🌙 ดึก'}];
            container.innerHTML = shifts.map(s => (allowed==='all' || allowed===s.v) ? `<label class="cursor-pointer"><input type="radio" name="shift" value="${s.v}" class="peer sr-only" onchange="refreshTimeSlots()"><div class="p-3 border-2 border-slate-700 rounded-xl text-center font-bold peer-checked:bg-blue-600 peer-checked:border-blue-600 transition">${s.l}</div></label>` : '').join('');
        }
        window.refreshTimeSlots = () => {
            const shift = document.querySelector('input[name="shift"]:checked')?.value;
            const sel = document.getElementById('tSlot');
            if(!shift || !shiftGroups[shift] || !sel) return;
            sel.innerHTML = '<option value="">-- เลือกเวลา --</option>';
            for(let p in shiftGroups[shift]) {
                const optGroup = document.createElement('optgroup'); optGroup.label = p;
                shiftGroups[shift][p].forEach(t => { const opt = document.createElement('option'); opt.value = t; opt.innerText = t; optGroup.appendChild(opt); });
                sel.appendChild(optGroup);
            }
        };
        window.saveData = async (e) => {
            e.preventDefault();
            const shiftEl = document.querySelector('input[name="shift"]:checked');
            const slot = document.getElementById('tSlot').value;
            if(!shiftEl || !slot) return Swal.fire('เตือน', 'เลือกกะและเวลาพักก่อนครับ', 'warning');
            const { error } = await appDB.from('schedules').insert([{ work_date: document.getElementById('wDate').value, staff_name: currentUserData.username, team: document.getElementById('dailyTeam').value, shift_name: shiftEl.value, time_slot: slot, department: currentUserData.department || 'AM' }]);
            if(!error) { fetchData(); Swal.fire({icon:'success', title:'บันทึกสำเร็จ', timer:800, showConfirmButton:false}); }
        };
        window.deleteSch = async (id) => { if(confirm('ลบรายการนี้?')) { await appDB.from('schedules').delete().eq('id', id); fetchData(); } };
        window.showPage = function(pageId) {
            document.querySelectorAll('.nm-menu-title').forEach(b => b.classList.remove('active'));
            document.getElementById('menu_' + pageId)?.classList.add('active');
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            const target = document.getElementById('page_' + pageId);
            if(target) target.classList.remove('hidden');
            if(pageId === 'main') fetchData();
            if(pageId === 'sheet') { closeSheet(); fetchSheets(); }
        };
        window.logout = () => { sessionStorage.clear(); location.reload(); };
        window.toggleTheme = () => { const isD = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isD?'dark':'light'); document.getElementById('themeIcon').innerText = isD?'light_mode':'dark_mode'; };
    </script>
</body>
</html>
